name: Infra Destroy (EC2 Spot)
run-name: Destroy EC2 Spot infrastructure for ${{ inputs.stack }}

on:
  workflow_dispatch:
    inputs:
      stack:
        description: "Stack to destroy"
        required: true
        default: dev.uae
        type: choice
        options:
          - dev.uae
          - dev.mumbai

permissions:
  id-token: write  # Required for AWS OIDC
  contents: read

jobs:
  ec2-spot:
    name: Destroy EC2 Spot (${{ inputs.stack }})
    runs-on: ubuntu-latest
    # Selects the GitHub Environment matching the target region.
    # To add a region: update both this expression and the inputs.stack options above.
    environment: ${{ inputs.stack == 'dev.uae' && 'uae' || 'mumbai' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          working-directory: ec2-spot
          github-token: ${{ github.token }}
          activate-environment: true

      - name: Configure AWS credentials via OIDC
        if: ${{ !env.ACT }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Configure AWS credentials (local)
        if: ${{ env.ACT }} # only run under act
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}
          output-credentials: true

      - name: Cache Pulumi venv
        uses: actions/cache@v5
        with:
          path: |
            ec2-spot/.venv
            ec2-spot/venv
          key: pulumi-venv-${{ runner.os }}-${{ hashFiles('ec2-spot/pyproject.toml') }}

      - name: Cache Pulumi plugins
        uses: actions/cache@v5
        with:
          path: ~/.pulumi/plugins
          key: pulumi-plugins-${{ runner.os }}

      - name: Pulumi Destroy
        uses: pulumi/actions@v6
        with:
          command: destroy
          stack-name: ${{ inputs.stack }}
          work-dir: ec2-spot
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
